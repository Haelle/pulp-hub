## PulpHub + reverse proxy for an existing Pulp instance.
##
## Edit nginx/pulp-cors-proxy.conf to set your Pulp upstream address,
## then: docker compose up -d
##
## PulpHub: http://localhost:8080
## Pulp API (via proxy): http://localhost:8081

services:
  pulp-proxy:
    image: nginx:alpine
    ports:
      - '8081:80'
    volumes:
      - ./nginx/pulp-cors-proxy.conf:/etc/nginx/nginx.conf:ro

  pulphub:
    image: docker.io/estb/pulp-hub:latest
    ports:
      - '8080:80'
    environment:
      PULP_URL: http://localhost:8081
