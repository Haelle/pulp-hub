name: CI

on:
  pull_request:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  check-and-test:
    name: Check, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run check

      - run: npm run build

      - run: npx playwright install --with-deps chromium

      - name: Run e2e tests (tape replay)
        run: npx playwright test
        env:
          TALKBACK_RECORD: DISABLED
