worker_processes auto;
error_log /dev/stdout info;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    types_hash_max_size 4096;
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;
    chunked_transfer_encoding on;
    keepalive_timeout 5;

    # Change this to your Pulp instance address
    upstream pulp {
        server pulp:80;
    }

    server {
        listen 80;

        # Security headers
        add_header Referrer-Policy same-origin always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        # CORS — allow browser access with credentials (session auth)
        # Change this to your PulpHub origin for production
        # For session auth, set this to your PulpHub origin (not wildcard)
        # Production example: set $cors_origin "https://hub.example.com";
        set $cors_origin "http://localhost:5173";

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, X-CSRFToken" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Docker-Content-Digest" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Session auth: rewrite Django cookies for cross-origin use
        # Required for HTTPS cross-origin deployments (SameSite=None needs Secure)
        # proxy_cookie_flags sessionid SameSite=None Secure;
        # proxy_cookie_flags csrftoken SameSite=None Secure;

        # Preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        location / {
            proxy_pass http://pulp;
            proxy_redirect off;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Strip Origin/Referer for session auth CSRF:
            # Django compares Origin vs Host — the browser sends the SPA origin
            # which won't match. Removing Origin makes Django skip the check
            # and rely on the CSRF token alone (which is sufficient).
            proxy_set_header Origin "";
            proxy_set_header Referer "";
        }
    }
}
